<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Yuniari Booth - Level Three (Select Mode)</title>
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>

    <div class="main-container">
        <div class="header-box">
            <h1>LEVEL THREE!</h1>
            <p>LOVELY DETAILS</p>
        </div>

        <div class="content-wrapper">
            <div class="option-card" data-capture="3">
                <div class="frame-photo blank-photo">
                    <span class="ratio-text">3x Shots</span>
                </div>
                <button class="btn-select">3 PHOTOS</button>
            </div>

            <div class="option-card" data-capture="4">
                <div class="frame-photo blank-photo">
                    <span class="ratio-text">4x Shots</span>
                </div>
                <button class="btn-select">4 PHOTOS</button>
            </div>

            <div class="option-card" data-capture="6">
                <div class="frame-photo blank-photo">
                    <span class="ratio-text">6x Shots</span>
                </div>
                <button class="btn-select">6 PHOTOS</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
