<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuni's Photobooth - Choose ur Frame</title>
    <link rel="stylesheet" href="css/style4.css">
</head>

<body>

    <div class="main-container">
        <div class="header-box">
            <h1>LEVEL THREE!</h1>
            <p>CHOOSE YOUR LANDSCAPE FRAME</p>
        </div>

        <div class="content-wrapper">
            <div class="frame-option-card" data-theme="pink">
                <div class="photobooth-strip theme-pink">
                    <div class="photos-container" id="preview-pink"></div>
                    <div class="strip-footer">La vie</div>
                </div>
                <button class="btn-select-theme">PINK THEME</button>
            </div>

            <div class="frame-option-card" data-theme="blue">
                <div class="photobooth-strip theme-blue">
                    <div class="photos-container" id="preview-blue"></div>
                    <div class="strip-footer">La vie</div>
                </div>
                <button class="btn-select-theme">BLUE THEME</button>
            </div>

            <!-- Opsi 3: Yellow Landscape Frame -->
            <div class="frame-option-card" data-theme="yellow">
                <div class="photobooth-strip theme-yellow">
                    <!-- Slot foto akan diisi otomatis lewat JS -->
                    <div class="photos-container" id="preview-yellow"></div>
                    <div class="strip-footer">La vie</div>
                </div>
                <button class="btn-select-theme">YELLOW THEME</button>
            </div>

            <div class="frame-option-card" data-theme="green">
                <div class="photobooth-strip theme-green">
                    <div class="photos-container" id="preview-green"></div>
                    <div class="strip-footer">La vie</div>
                </div>
                <button class="btn-select-theme">GREEN THEME</button>
            </div>

            <div class="frame-option-card" data-theme="purple">
                <div class="photobooth-strip theme-purple">
                    <div class="photos-container" id="preview-purple"></div>
                    <div class="strip-footer">La vie</div>
                </div>
                <button class="btn-select-theme">PURPLE THEME</button>
            </div>
        </div>
    </div>

    <script src="js/script4.js"></script>
</body>

</html>
